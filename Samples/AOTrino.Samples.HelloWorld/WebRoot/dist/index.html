<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AOTrino — Hello World</title>
    <style>
        :root { color-scheme: dark; }
        html, body { height: 100%; margin: 0; }
        body {
            display: grid;
            place-items: center;
            background: radial-gradient(120% 120% at 50% 0%, #1b2a3a 0%, #0d1117 60%);
            color: #e6edf3;
            font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        .card {
            text-align: center;
            padding: 3rem 3.5rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        }
        h1 {
            margin: 0 0 0.25rem;
            font-size: 2.6rem;
            font-weight: 650;
            letter-spacing: -0.02em;
            background: linear-gradient(90deg, #58a6ff, #a371f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        p { margin: 0.4rem 0 0; color: #8b949e; font-size: 1rem; }
        code { color: #79c0ff; font-family: "Cascadia Code", "Consolas", monospace; }
        .meta { margin-top: 1.6rem; font-size: 0.82rem; color: #6e7681; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hello from AOTrino</h1>
        <p>Native <strong>.NET AOT</strong> · <strong>WebView2</strong> · single-exe · Windows x64</p>
        <p>Served from an embedded <code>WebRoot\dist</code>, extracted at runtime.</p>
        <div class="meta" id="meta">initializing…</div>
    </div>
    <script>
        const ua = navigator.userAgent.match(/Edg?\/([\d.]+)/);
        document.getElementById("meta").textContent =
            "Chromium " + (ua ? ua[1] : "unknown") + " · rendered " + new Date().toLocaleTimeString();
    </script>
</body>
</html>
